name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true
      - run: scala-cli fmt --check .
      - run: scala-cli test .

